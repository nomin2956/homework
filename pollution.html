<h1>Агаарын бохирдол</h1>
<p>Агаарын бохирдол нь хүний эрүүл мэндэд сөрөг нөлөөтэй. Ялангуяа өвлийн улиралд Улаанбаатар хотод ихэсдэг.</p>

<ul>
    <li>Шалтгаан: Түүхий нүүрс</li>
    <li>Нөлөө: Амьсгалын замын өвчин</li>
    <li>Шийдэл: Ногоон байгууламж нэмэх</li>
</ul>
